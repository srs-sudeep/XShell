name: Release Binaries

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing git tag to publish assets to (example: v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux-manylinux:
    name: Build Linux (manylinux2014)
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Python 3.11 in manylinux
        shell: bash
        run: |
          set -euo pipefail
          echo "PYBIN=/opt/python/cp311-cp311/bin/python" >> "$GITHUB_ENV"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          "$PYBIN" -m pip install --upgrade pip
          "$PYBIN" -m pip install -r requirements.txt

      - name: Build native binary
        shell: bash
        run: |
          set -euo pipefail
          "$PYBIN" build.py

      - name: Stage native binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/xshell release/xshell

      - name: Build web binary
        shell: bash
        run: |
          set -euo pipefail
          "$PYBIN" build.py --web

      - name: Create release archive (Linux manylinux)
        shell: bash
        run: |
          set -euo pipefail
          cp dist/xshell-web release/xshell-web
          tar -czf "xshell-linux-x86_64-manylinux2014.tar.gz" -C release .

      - name: Upload Linux binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name || github.ref_name }}
          files: |
            xshell-linux-x86_64-manylinux2014.tar.gz

  build-nonlinux:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build native binary
        run: python build.py

      - name: Stage native binary (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/xshell release/xshell

      - name: Stage native binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/xshell.exe release/xshell.exe

      - name: Build web binary
        run: python build.py --web

      - name: Create release archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          cp dist/xshell-web release/xshell-web
          tar -czf "xshell-${OS}-${ARCH}.tar.gz" -C release .

      - name: Create release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $os = $env:RUNNER_OS.ToLower()
          $arch = $env:RUNNER_ARCH.ToLower()
          Copy-Item dist/xshell-web.exe release/xshell-web.exe
          Compress-Archive -Path release/* -DestinationPath "xshell-$os-$arch.zip" -Force

      - name: Upload non-Linux binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name || github.ref_name }}
          files: |
            xshell-macos-*.tar.gz
            xshell-windows-*.zip
